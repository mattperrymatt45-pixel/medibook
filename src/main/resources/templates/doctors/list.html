<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBook – Doctors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MediBook</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/patients}">Patients</a>
            <a class="nav-link active" th:href="@{/doctors}">Doctors</a>
            <a class="nav-link" th:href="@{/appointments}">Appointments</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">&#9632; Doctors</h2>

    <!-- Add Doctor Form -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light fw-semibold">Add Doctor</div>
        <div class="card-body">
            <form th:action="@{/doctors/add}" th:object="${newDoctor}" method="post" class="row g-2">
                <div class="col-md-3">
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Full Name" required>
                </div>
                <div class="col-md-3">
                    <input type="text" th:field="*{specialization}" class="form-control" placeholder="Specialization" required>
                </div>
                <div class="col-md-2">
                    <input type="text" th:field="*{roomNumber}" class="form-control" placeholder="Room No.">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Doctors Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Room</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="doctor : ${doctors}">
                        <td th:text="${doctor.id}"></td>
                        <td th:text="${doctor.name}"></td>
                        <td th:text="${doctor.specialization}"></td>
                        <td th:text="${doctor.roomNumber}"></td>
                        <td>
                            <button class="btn btn-danger btn-sm"
                                    onclick="confirmDelete(this)"
                                    th:data-url="@{/doctors/delete/__${doctor.id}__}">
                                Delete
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(doctors)}">
                        <td colspan="5" class="text-center text-muted">No doctors found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
