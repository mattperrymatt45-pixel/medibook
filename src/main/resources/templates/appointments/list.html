<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediBook – Appointments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MediBook</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/patients}">Patients</a>
            <a class="nav-link" th:href="@{/doctors}">Doctors</a>
            <a class="nav-link active" th:href="@{/appointments}">Appointments</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">&#9632; MediBook Appointments</h2>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Book Appointment Form -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light fw-semibold">Book Appointment</div>
        <div class="card-body">
            <form action="/appointments/add" method="post" class="row g-2" id="appointmentForm">
                <div class="col-md-3">
                    <select name="patientId" class="form-select" required>
                        <option value="" disabled selected>Patient</option>
                        <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select name="doctorId" class="form-select" required id="doctorSelect">
                        <option value="" disabled selected>Doctor</option>
                        <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input type="date" name="apptDate" class="form-control" required id="apptDate">
                </div>
                <div class="col-md-2">
                    <select name="apptTime" class="form-select" required id="apptTime">
                        <option value="" disabled selected>Time</option>
                        <option>09:00 AM</option>
                        <option>09:30 AM</option>
                        <option>10:00 AM</option>
                        <option>10:30 AM</option>
                        <option>11:00 AM</option>
                        <option>11:30 AM</option>
                        <option>12:00 PM</option>
                        <option>12:30 PM</option>
                        <option>01:00 PM</option>
                        <option>01:30 PM</option>
                        <option>02:00 PM</option>
                        <option>02:30 PM</option>
                        <option>03:00 PM</option>
                        <option>03:30 PM</option>
                        <option>04:00 PM</option>
                        <option>04:30 PM</option>
                        <option>05:00 PM</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Book Appt.</button>
                </div>
            </form>
            <!-- Slot conflict warning (frontend JS) -->
            <div id="slotWarning" class="alert alert-warning mt-2 d-none">
                ⚠️ This slot might already be taken. Please choose another time.
            </div>
        </div>
    </div>

    <!-- Appointments Table -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-primary">
                    <tr>
                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.id}"></td>
                        <td th:text="${appt.patient.name}"></td>
                        <td th:text="${appt.doctor.name}"></td>
                        <td th:text="${appt.apptDate}"></td>
                        <td th:text="${appt.apptTime}"></td>
                        <td>
                            <button class="btn btn-danger btn-sm"
                                    onclick="confirmDelete(this)"
                                    th:data-url="@{/appointments/delete/__${appt.id}__}">
                                Delete
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(appointments)}">
                        <td colspan="6" class="text-center text-muted">No appointments found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Pass existing appointments to JS for frontend slot check -->
<script th:inline="javascript">
    const existingAppointments = /*[[${appointments}]]*/ [];
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
